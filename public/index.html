<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Risk Score Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Generate a 2-page dark risk score report for any stock ticker.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="hero no-print" id="hero">
  <div class="eyebrow">Risk Score Generator</div>
  <h1>Any ticker. <span>One risk report.</span></h1>
  <p>Type a stock ticker to generate a 2-page valuation, financial health &amp; growth risk score — built from live fundamentals.</p>
  <form class="search-row" id="searchForm">
    <input type="text" id="tickerInput" placeholder="e.g. AAPL, MSFT, NVDA" maxlength="10" autocomplete="off" autocapitalize="characters" />
    <button type="submit" id="searchBtn">Generate</button>
  </form>
  <div class="chips" id="chips">
    <span class="chip" data-t="AAPL">AAPL</span>
    <span class="chip" data-t="MSFT">MSFT</span>
    <span class="chip" data-t="NVDA">NVDA</span>
    <span class="chip" data-t="TSLA">TSLA</span>
    <span class="chip" data-t="AMZN">AMZN</span>
  </div>
</div>

<div id="statusArea"></div>

<div class="toolbar no-print" id="toolbar" style="display:none;">
  <div class="brand" id="toolbarBrand">Risk Score Report</div>
  <div class="actions">
    <button class="btn" onclick="location.hash='';location.reload()">↺ New ticker</button>
    <button class="btn" onclick="window.print()">⎙ Print / Save PDF</button>
    <button class="btn primary" id="copyBtn">⧉ Copy Summary</button>
  </div>
</div>
<div class="toast" id="toast">Summary copied to clipboard</div>

<div id="report"></div>

<script src="/app.js"></script>
</body>
</html>
