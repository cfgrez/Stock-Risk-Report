name = "stock-risk-report"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serves everything in public/ as static assets (HTML/CSS/JS).
# Requests to /api/report are handled by src/index.js instead.
[assets]
directory = "./public"
binding = "ASSETS"

# Secrets (set these, do NOT put real values in this file):
#   wrangler secret put FMP_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY   (optional, enables AI-written catalysts/risks/verdict)
